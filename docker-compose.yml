services:
  landing:
    image: nginx:1.27-alpine
    restart: unless-stopped
    # files are served live from the mounted folder — change them and they're
    # instantly live (a `git pull` updates the site with NO rebuild / NO restart).
    volumes:
      - ./landing:/usr/share/nginx/html:ro
      - ./landing/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    expose:
      - "80"

  game:
    build: .
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/proxy.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certs:/etc/nginx/certs:ro
    depends_on:
      - landing
      - game
