# ============================================================
#  Reverse proxy — routes by domain, terminates TLS.
#  Replace the landing domain (pokeripping.fun) with yours.
# ============================================================

# redirect all plain HTTP to HTTPS
server {
  listen 80 default_server;
  server_name _;
  return 301 https://$host$request_uri;
}

# ---------- LANDING : pokeripping.fun ----------
server {
  listen 443 ssl;
  http2 on;
  server_name pokeripping.fun www.pokeripping.fun;   # <-- replace with your landing domain

  ssl_certificate     /etc/nginx/certs/pokeripping.pem;
  ssl_certificate_key /etc/nginx/certs/pokeripping.key;

  location / {
    proxy_pass http://landing:80;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

# ---------- GAME : pokedungeon.fun ----------
server {
  listen 443 ssl;
  http2 on;
  server_name pokedungeon.fun www.pokedungeon.fun;

  ssl_certificate     /etc/nginx/certs/pokedungeon.pem;
  ssl_certificate_key /etc/nginx/certs/pokedungeon.key;

  location / {
    proxy_pass http://game:3000;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
