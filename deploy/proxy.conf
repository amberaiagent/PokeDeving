# ============================================================
#  Reverse proxy — routes by domain, terminates TLS.
#  Upstreams are resolved dynamically via Docker's DNS (127.0.0.11)
#  so a redeployed game/landing container (new IP) is picked up
#  automatically — no more 502 after a deploy.
# ============================================================

# redirect all plain HTTP to HTTPS
server {
  listen 80 default_server;
  server_name _;
  return 301 https://$host$request_uri;
}

# ---------- LANDING : pokeripping.fun ----------
server {
  listen 443 ssl;
  http2 on;
  server_name pokeripping.fun www.pokeripping.fun;

  ssl_certificate     /etc/nginx/certs/pokeripping.pem;
  ssl_certificate_key /etc/nginx/certs/pokeripping.key;

  location / {
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $upstream_landing landing:80;
    proxy_pass http://$upstream_landing;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

# ---------- GAME : pokedungeon.fun ----------
server {
  listen 443 ssl;
  http2 on;
  server_name pokedungeon.fun www.pokedungeon.fun;

  ssl_certificate     /etc/nginx/certs/pokedungeon.pem;
  ssl_certificate_key /etc/nginx/certs/pokedungeon.key;

  location / {
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $upstream_game game:3000;
    proxy_pass http://$upstream_game;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
