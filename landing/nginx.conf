server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # hide build/config files that live in the mounted folder
  location ~* /(Dockerfile|nginx\.conf|README\.txt)$ { return 404; }
  location ~ /\.            { return 404; }   # any dotfile (.dockerignore, etc.)

  # single page — fall back to index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # cache static assets
  location ~* \.(?:css|js|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
    expires 7d;
    add_header Cache-Control "public";
  }
}
